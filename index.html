<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE GUJARAT | Aurora Retail</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --aura: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #f472b6 100%); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; overflow-x: hidden; scroll-behavior: smooth; }

        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(244, 114, 182, 0.1) 0%, transparent 50%);
            filter: blur(80px);
        }

        /* --- TOAST NOTIFICATION --- */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2); padding: 12px 20px; border-radius: 20px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px;
            transform: translateX(120%); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-card.show { transform: translateX(0); }

        /* --- UI COMPONENTS --- */
        .product-card {
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border: 1px solid white;
            border-radius: 40px 10px 40px 10px; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer;
        }
        .product-card:hover { border-radius: 10px 40px 10px 40px; transform: translateY(-5px); border-color: #6366f1; }
        .btn-aurora { background: var(--aura); color: white; transition: all 0.3s; }
        .text-gradient { background: var(--aura); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .cat-btn { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .cat-btn.active { background: #000; color: #fff; border-color: #000; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>
    <div id="toast-container"></div>

    <div id="main-view">
        <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-[200] w-[95%] max-w-7xl">
            <div class="bg-white/80 backdrop-blur-xl px-6 py-4 flex justify-between items-center rounded-full border border-white shadow-xl">
                <div onclick="goHome()" class="flex items-center gap-3 cursor-pointer group">
                    <div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-indigo-600 to-pink-500 flex items-center justify-center text-white font-black group-hover:scale-110 transition-transform">L</div>
                    <span class="text-xl font-black italic">LUXE<span class="text-gradient">GUJARAT</span></span>
                </div>
                
                <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="શોધો..." class="hidden md:block w-64 px-6 py-2 rounded-full bg-slate-50 border-none outline-none text-sm">
                
                <button onclick="toggleCart(true)" class="relative p-3 bg-slate-50 rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
            </div>
        </nav>

        <section id="home-anchor" class="pt-40 pb-10 text-center">
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-4">ELITE <span class="text-gradient">COLLECTION</span></h1>
            <div id="category-bar" class="flex gap-3 overflow-x-auto no-scrollbar py-6 max-w-7xl mx-auto px-8 justify-start md:justify-center"></div>
        </section>

        <section class="max-w-[1440px] mx-auto px-8 pb-40">
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>
    </div>

    <div id="checkout-view" class="fixed inset-0 z-[500] bg-white transform translate-x-full transition-transform duration-700 flex flex-col md:flex-row">
        <div class="md:w-5/12 bg-slate-900 p-12 flex flex-col justify-between text-white relative overflow-hidden">
            <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
            <button onclick="closeCheckout()" class="text-4xl font-light hover:rotate-90 transition relative z-10">✕</button>
            <div class="relative z-10">
                <h2 class="text-8xl font-black opacity-10 tracking-tighter uppercase">Cart</h2>
                <div class="mt-12">
                    <p class="text-slate-500 uppercase tracking-widest text-xs mb-2">Total Amount</p>
                    <div id="checkout-total" class="text-6xl font-black text-indigo-400">₹0</div>
                </div>
            </div>
        </div>
        <div class="md:w-7/12 p-12 overflow-y-auto bg-white flex flex-col">
            <h2 class="text-4xl font-black mb-10">ચેકઆઉટ <span class="text-gradient">વિગતો</span></h2>
            <form onsubmit="processOrder(event)" class="space-y-6">
                <input type="text" placeholder="તમારું નામ" required class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none">
                <input type="text" placeholder="સંપૂર્ણ સરનામું" required class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" placeholder="શહેર" required class="w-full p-4 rounded-2xl bg-slate-50 border-none">
                    <input type="text" placeholder="પિનકોડ" required class="w-full p-4 rounded-2xl bg-slate-50 border-none">
                </div>
                <div class="p-6 border-2 border-indigo-600 rounded-3xl bg-indigo-50 flex items-center gap-4">
                    <div class="w-5 h-5 rounded-full border-4 border-indigo-600 bg-white"></div>
                    <span class="font-bold">Cash on Delivery</span>
                </div>
                <button type="submit" class="w-full btn-aurora py-6 rounded-3xl font-black text-2xl shadow-xl mt-6">ઓર્ડર પૂર્ણ કરો</button>
            </form>
        </div>
    </div>

    <div id="product-modal" class="fixed inset-0 z-[400] hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-900/40" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-4xl rounded-[3rem] overflow-hidden shadow-2xl flex flex-col md:flex-row">
            <div class="md:w-1/2 bg-slate-50 p-12 flex items-center justify-center"><img id="modal-img" class="max-h-[350px] object-contain"></div>
            <div class="md:w-1/2 p-12 flex flex-col">
                <button onclick="closeModal()" class="self-end text-slate-300 text-2xl">✕</button>
                <h2 id="modal-title" class="text-3xl font-black mb-4"></h2>
                <p id="modal-desc" class="text-slate-500 mb-8 flex-1"></p>
                <div class="flex items-center justify-between border-t pt-8">
                    <span id="modal-price" class="text-3xl font-black"></span>
                    <button id="modal-add-btn" class="btn-aurora px-8 py-4 rounded-xl font-black">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="fixed inset-0 z-[300] bg-white transform translate-x-full transition-transform duration-700 flex flex-col md:flex-row">
        <div class="md:w-5/12 bg-slate-900 p-12 text-white flex flex-col justify-between">
            <button onclick="toggleCart(false)" class="text-4xl">✕</button>
            <div id="side-cart-total" class="text-6xl font-black text-indigo-400">₹0</div>
        </div>
        <div class="md:w-7/12 p-12 overflow-y-auto bg-white flex flex-col">
            <div id="cart-items" class="flex-1 space-y-6"></div>
            <button onclick="openCheckout()" class="mt-8 btn-aurora py-6 rounded-3xl font-black text-2xl">ઓર્ડર કરો</button>
        </div>
    </div>

    <script>
        let allProducts = [], cart = [], currentCategory = 'all';
        const INR_RATE = 84.5;

        async function init() {
            try {
                const res = await fetch('https://dummyjson.com/products?limit=100');
                const data = await res.json();
                allProducts = data.products;
                renderCategories(); 
                applyFilters();
            } catch (err) { console.error("Failed to load products", err); }
        }

        // --- HOME REDIRECT FUNCTION ---
        function goHome() {
            // Reset Category
            currentCategory = 'all';
            // Clear Search Input
            document.getElementById('searchInput').value = '';
            // Close any open overlays
            toggleCart(false);
            closeCheckout();
            closeModal();
            // Re-render and Scroll Up
            renderCategories();
            applyFilters();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderCategories() {
            const container = document.getElementById('category-bar');
            const cats = ['all', ...new Set(allProducts.map(p => p.category))];
            container.innerHTML = cats.map(c => `
                <button onclick="setCategory('${c}')" 
                        class="cat-btn px-6 py-2 rounded-full text-sm font-bold capitalize whitespace-nowrap 
                        ${c === currentCategory ? 'active' : 'bg-white text-slate-600'}">
                    ${c.replace('-', ' ')}
                </button>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategories();
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const matchesSearch = p.title.toLowerCase().includes(query) || p.category.includes(query);
                const matchesCategory = currentCategory === 'all' || p.category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            const grid = document.getElementById('product-grid');
            grid.innerHTML = filtered.map(p => `
                <div class="product-card p-6" onclick="openModal(${p.id})">
                    <img src="${p.thumbnail}" class="w-full aspect-square object-contain mb-4">
                    <h3 class="font-black truncate text-slate-800">${p.title}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-xl font-black">₹${Math.floor(p.price * INR_RATE).toLocaleString()}</span>
                        <button onclick="event.stopPropagation(); addToCart(${p.id})" class="w-10 h-10 btn-aurora rounded-xl font-bold shadow-lg">+</button>
                    </div>
                </div>
            `).join('');
        }

        function showToast(p) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-card';
            toast.innerHTML = `<img src="${p.thumbnail}" class="w-10 h-10 object-contain"><p class="text-sm font-bold">${p.title} ઉમેર્યું!</p>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, 3000);
        }

        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            cart.push({...p, uid: Date.now()});
            updateCart(); 
            showToast(p);
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((s, i) => s + (i.price * INR_RATE), 0);
            const totalStr = `₹${Math.floor(total).toLocaleString()}`;
            document.getElementById('side-cart-total').innerText = totalStr;
            document.getElementById('checkout-total').innerText = totalStr;
            document.getElementById('cart-items').innerHTML = cart.map(item => `
                <div class="flex items-center gap-4 border-b border-slate-50 pb-4">
                    <img src="${item.thumbnail}" class="w-16 h-16 object-contain border rounded-xl">
                    <div class="flex-1">
                        <h4 class="font-bold text-sm">${item.title}</h4>
                        <p class="text-indigo-600 font-bold text-xs">₹${Math.floor(item.price * INR_RATE).toLocaleString()}</p>
                    </div>
                    <button onclick="remove(${item.uid})" class="text-slate-300 hover:text-red-500 transition">✕</button>
                </div>
            `).join('');
        }

        function remove(uid) { cart = cart.filter(i => i.uid !== uid); updateCart(); }
        function openModal(id) {
            const p = allProducts.find(x => x.id === id);
            document.getElementById('modal-img').src = p.thumbnail;
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-desc').innerText = p.description;
            document.getElementById('modal-price').innerText = `₹${Math.floor(p.price * INR_RATE).toLocaleString()}`;
            document.getElementById('modal-add-btn').onclick = () => { addToCart(p.id); closeModal(); };
            document.getElementById('product-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }
        function toggleCart(show) { document.getElementById('cart-sidebar').style.transform = show ? 'translateX(0)' : 'translateX(100%)'; }
        function openCheckout() { if(cart.length > 0) { toggleCart(false); document.getElementById('checkout-view').style.transform = 'translateX(0)'; } }
        function closeCheckout() { document.getElementById('checkout-view').style.transform = 'translateX(100%)'; }
        function processOrder(e) { e.preventDefault(); alert("ઓર્ડર સફળતાપૂર્વક લેવામાં આવ્યો છે!"); cart = []; updateCart(); closeCheckout(); }

        init();
    </script>
</body>
</html>
